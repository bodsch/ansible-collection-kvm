---

# The pool is created by bodsch.kvm.storage_pool; here we only consume it.
- name: ensure storage pool is active and read its path
  bodsch.kvm.libvirt_pool:
    uri: "{{ base_images_libvirt.uri }}"
    pools:
      - name: "{{ base_images_libvirt.pool }}"
        state: active
  register: base_images_pool

- name: set storage pool path fact
  ansible.builtin.set_fact:
    base_images_pool_path: "{{ base_images_pool.pools[base_images_libvirt.pool].path }}"

- name: download base images into the pool
  become: true
  ansible.builtin.get_url:
    url: "{{ item.source }}"
    dest: "{{ base_images_pool_path }}/{{ item.dest }}"
    checksum: "{{ item.checksum | default(omit) }}"
    mode: u=rw,g=r,o=r
  loop: "{{ base_images }}"
  loop_control:
    label: "{{ item.dest }}"
  register: base_images_downloaded

- name: refresh storage pool so libvirt registers the new volumes
  bodsch.kvm.libvirt_pool:
    uri: "{{ base_images_libvirt.uri }}"
    pools:
      - name: "{{ base_images_libvirt.pool }}"
        state: active
        refresh: true
  when:
    - base_images_downloaded is changed

...
