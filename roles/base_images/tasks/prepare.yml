---

# ansible_local is gathered at play start; refresh it so a libvirt role that ran
# earlier in the same play has its 'libvirtd' fact visible here.
- name: refresh local facts
  ansible.builtin.setup:
    filter: ansible_local
  when:
    - not ansible_check_mode

- name: ensure libvirt has been provisioned
  ansible.builtin.assert:
    that:
      - ansible_local.libvirtd is defined
      - ansible_local.libvirtd.version is defined
    fail_msg: "libvirt is not provisioned on this host. Run the bodsch.kvm.libvirt role first."
    quiet: true

...
