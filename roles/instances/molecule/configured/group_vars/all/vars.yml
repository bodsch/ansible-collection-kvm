---

instances_libvirt:
  uri: "qemu:///system"
  pool: "pool"                # provided by the storage_pool role (see libvirt.yml)
  network: "vm-network"       # provided by the network role (see libvirt.yml)

instances_ssh_public_keys:
  - "ssh-ed25519 AAAA... meinkey"
  - "ssh-rsa BBBB... otherkey"

# headless: rely on the serial console, so no SPICE/VNC display is needed in CI.
instances_graphics:
  type: "none"

# Base image volume per `os`. These volumes MUST already exist in the pool
# (created out of band, e.g. via virt-manager or a separate playbook); molecule
# does not download them.
instances_os_base_volumes:
  debian: "debian-13.qcow2"
  arch: "archlinux-base.qcow2"

# VMs as a list. `os` selects cloud_init_<os>.yaml.j2 and the
# instances_os_base_volumes entry. `state` (running|defined) is optional.
instances:
  - hostname: "dns"
    domain: molecule.test
    vcpus: 1
    memory_mb: 1024
    os: "debian"
    ip:
      prefix: "192.168.0"
      octet: 11
    os_disk_gb: 10
    data_disks:
      - { name: "data0", size_gb: 20 }
      - { name: "logs", size_gb: 10 }

  - hostname: "arch-ci"
    domain: molecule.test
    vcpus: 2
    memory_mb: 2048
    os: "debian"
    ip: { prefix: "192.168.10", octet: 42 }
    os_disk_gb: 20
    data_disks: []
    state: "defined"          # only define, do not start (exercises instances_state override)

...
