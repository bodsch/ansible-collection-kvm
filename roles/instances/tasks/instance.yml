---

- name: assemble VM vars
  ansible.builtin.set_fact:
    vm: "{{ {
      'name': vmitem.name | default(vmitem.hostname),
      'hostname': vmitem.hostname,
      'os': vmitem.os | lower,
      'vcpus': vmitem.vcpus,
      'memory_mb': vmitem.memory_mb,
      'os_disk_gb': vmitem.os_disk_gb,
      'data_disks': vmitem.data_disks | default([]),
      'ip_prefix': vmitem.ip.prefix,
      'ip_octet':  vmitem.ip.octet,
      'state': vmitem.state | default(instances_state)
    } }}"

- name: validate requested run state for "{{ vm.hostname }}"
  ansible.builtin.assert:
    that:
      - vm.state in ['running', 'defined', 'shutdown', 'paused', 'destroyed']
    fail_msg: >-
      instance '{{ vm.hostname }}' has an invalid state '{{ vm.state }}';
      expected one of: running, defined, shutdown, paused, destroyed
    quiet: true

# OS disk (cloned from the base image) and any data disks in one call.
- name: create OS and data disks
  bodsch.kvm.libvirt_volume:
    uri: "{{ instances_libvirt.uri }}"
    pool: "{{ instances_libvirt.pool }}"
    volumes: "{{ vm | bodsch.kvm.instance_volumes(instances_os_base_volumes) }}"

# render cloud-init data (distro-specific)
- name: render USERDATA
  ansible.builtin.set_fact:
    ci_userdata: >-
      {{ lookup('template', 'cloud_init_' + vm.os + '.yaml.j2',
                convert_data=True,
                template_vars={
                  'hostname': vm.hostname,
                  'domain': 'matrix.lan',
                  'ssh_public_key': instances_ssh_public_key
                }) }}

- name: build METADATA + NETWORK_CONFIG
  ansible.builtin.set_fact:
    ci_metadata:
      local-hostname: "{{ vm.hostname }}"
    ci_netcfg:
      version: 2
      ethernets:
        eth0:
          addresses: ["{{ vm.ip_prefix }}.{{ vm.ip_octet }}/24"]
          gateway4: "{{ vm.ip_prefix }}.1"
          nameservers:
            addresses: ["{{ vm.ip_prefix }}.1", "1.1.1.1"]

- name: create cloud-init CIDATA seed ISO in pool
  bodsch.kvm.libvirt_cloud_init_iso:
    uri: "{{ instances_libvirt.uri }}"
    pool: "{{ instances_libvirt.pool }}"
    images:
      - name: "{{ vm.name }}-cidata.iso"
        metadata: "{{ ci_metadata }}"
        user_data: "{{ ci_userdata }}"
        network_config: "{{ ci_netcfg }}"

# Define the domain and reconcile its run state in one call. The domain is
# always defined; `state` then enforces the run state:
#   running   -> start (or unpause)
#   defined   -> only define, leave the current run state untouched (-> present)
#   shutdown  -> graceful ACPI shutdown
#   destroyed -> forced power-off
#   paused    -> pause (only takes effect if the domain is currently running)
- name: define and reconcile instance "{{ vm.name }}" ({{ vm.state }})
  bodsch.kvm.libvirt_domain:
    uri: "{{ instances_libvirt.uri }}"
    domains:
      - name: "{{ vm.name }}"
        state: "{{ 'present' if vm.state == 'defined' else vm.state }}"
        domain_type: "{{ libvirt_domain_type }}"
        memory_mb: "{{ vm.memory_mb }}"
        vcpus: "{{ vm.vcpus }}"
        autostart: "{{ instances_autostart }}"
        disks: "{{ vm | bodsch.kvm.instance_disks(instances_pool_path, instances_root_disk_bus, instances_cdrom_bus, instances_data_disk_letters) }}"
        interfaces:
          - source: "{{ instances_libvirt.network }}"
        graphics:
          type: >-
            {{ (instances_graphics.type | default('') | lower)
               if (instances_graphics.type | default('') | lower) in ['spice', 'vnc']
               else 'none' }}

...
