---

- name: assemble VM vars
  ansible.builtin.set_fact:
    vm: "{{ {
      'key': vmitem.key,
      'name': instances[vmitem.key].hostname,
      'hostname': instances[vmitem.key].hostname,
      'os': instances[vmitem.key].os | lower,
      'vcpus': instances[vmitem.key].vcpus,
      'memory_mb': instances[vmitem.key].memory_mb,
      'os_disk_gb': instances[vmitem.key].os_disk_gb,
      'data_disks': instances[vmitem.key].data_disks | default([]),
      'ip_prefix': instances[vmitem.key].ip.prefix,
      'ip_octet':  instances[vmitem.key].ip.octet
    } }}"

- name: create OS disk by cloning base volume
  community.libvirt.virt_volume:
    uri: "{{ instances_libvirt.uri }}"
    pool: "{{ instances_libvirt.pool }}"
    command: create
    clone_source: "{{ instances_os_base_volumes[vm.os] }}"
    xml: |
      <volume type='file'>
        <name>{{ vm.name }}-os.qcow2</name>
        <capacity unit='G'>{{ vm.os_disk_gb }}</capacity>
        <target><format type='qcow2'/></target>
      </volume>

- name: create data disks
  community.libvirt.virt_volume:
    uri: "{{ instances_libvirt.uri }}"
    pool: "{{ instances_libvirt.pool }}"
    command: create
    xml: |
      <volume type='file'>
        <name>{{ vm.name }}-{{ item.name }}.qcow2</name>
        <capacity unit='G'>{{ item.size_gb }}</capacity>
        <target><format type='qcow2'/></target>
      </volume>
  loop: "{{ vm.data_disks }}"

# render cloud-init data (distro-specific)
- name: render USERDATA
  ansible.builtin.set_fact:
    ci_userdata: >-
      {{ lookup('template', 'cloud_init_' + vm.os + '.yaml.j2',
                convert_data=True,
                template_vars={
                  'hostname': vm.hostname,
                  'domain': 'matrix.lan',
                  'ssh_public_key': instances_ssh_public_key
                }) }}

- name: build METADATA + NETWORK_CONFIG
  ansible.builtin.set_fact:
    ci_metadata:
      local-hostname: "{{ vm.hostname }}"
    ci_netcfg:
      version: 2
      ethernets:
        eth0:
          addresses: ["{{ vm.ip_prefix }}.{{ vm.ip_octet }}/24"]
          gateway4: "{{ vm.ip_prefix }}.1"
          nameservers:
            addresses: ["{{ vm.ip_prefix }}.1", "1.1.1.1"]

- name: create cloud-init CIDATA ISO in pool
  community.libvirt.virt_volume:
    uri: "{{ instances_libvirt.uri }}"
    pool: "{{ instances_libvirt.pool }}"
    command: create_cidata_cdrom
    name: "{{ vm.name }}-cidata.iso"
    cloudinit_config:
      METADATA: "{{ ci_metadata }}"
      USERDATA: "{{ ci_userdata }}"
      NETWORK_CONFIG: "{{ ci_netcfg }}"

- name: define domain from XML
  community.libvirt.virt:
    uri: "{{ instances_libvirt.uri }}"
    command: define
    autostart: "{{ instances_autostart }}"
    xml: "{{ lookup('template', 'vm.xml.j2',
           template_vars={
             'vm': vm,
             'libvirt_network': instances_libvirt.network,
             'pool_path': instances_pool_path,
             'root_disk_bus': instances_root_disk_bus,
             'cdrom_bus': instances_cdrom_bus,
             'graphics_type': instances_graphics.type,
             'data_disk_letters': instances_data_disk_letters
           }) }}"

- name: ensure VM running
  community.libvirt.virt:
    uri: "{{ instances_libvirt.uri }}"
    name: "{{ vm.name }}"
    state: running

...
