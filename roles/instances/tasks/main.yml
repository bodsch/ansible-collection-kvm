---

- name: prepare
  ansible.builtin.include_tasks: prepare.yml

# Storage pools and virtual networks are provisioned by the dedicated
# bodsch.kvm.storage_pool / bodsch.kvm.network roles (run earlier in the play).
# Here we only ensure the target pool is usable and read its path.
- name: ensure storage pool
  ansible.builtin.import_tasks: pool.yml

- name: create instances
  ansible.builtin.include_tasks: instance.yml
  loop: "{{ instances }}"
  loop_control:
    loop_var: vmitem
    label: "{{ vmitem.hostname }}"

...
