---

- name: include OS specific configuration ({{ ansible_facts.distribution }} ({{ ansible_facts.os_family }}) {{ ansible_facts.distribution_major_version }})
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      paths:
        - "vars"
      files:
        # eg. debian-10 / ubuntu-20.04 / centos-8 / oraclelinux-8
        - "{{ ansible_facts.distribution | lower }}-{{ ansible_facts.distribution_major_version }}.yml"
        # eg. archlinux-systemd / archlinux-openrc
        - "{{ ansible_facts.distribution | lower }}-{{ ansible_facts.service_mgr | lower }}.yml"
        # eg. debian / ubuntu / centos / oraclelinux
        - "{{ ansible_facts.distribution | lower }}.yml"
        # eg. redhat / debian / archlinux
        - "{{ ansible_facts.os_family | lower }}.yml"
        - default.yaml
      skip: true

- name: update package cache
  ansible.builtin.package:
    update_cache: true

- name: load cpu info
  become: true
  ansible.builtin.slurp:
    src: /proc/cpuinfo
  register: cpu_info

- name: identify hardware virtualization support
  ansible.builtin.set_fact:
    libvirt_domain_type: "{{
      cpu_info['content'] | b64decode |
      regex_search('(vmx|svm)', multiline=True) |
      ternary('kvm', 'qemu') }}"

- name: fail if Virtualization Technology (VT) is not kvm or qemu
  ansible.builtin.fail:
    msg: >
      Virtualization Technology (VT) is currently disabled.
      Please enable VT before running this role again.
  when:
    - not libvirt_domain_type in ["kvm","qemu"]

- name: build
  #when:
  #  - not instances_installed
  block:

    - name: install build dependencies
      ansible.builtin.package:
        name: "{{ instances_build_dependencies }}"
        state: present
      when:
        - instances_build_dependencies | default([]) | count > 0

    - name: create sudo rules for aur_builder
      ansible.builtin.copy:
        content: '%aur_builder ALL=(ALL) NOPASSWD: ALL'
        dest: /etc/sudoers.d/aur
        mode: "0640"
        validate: visudo -cf %s

    - name: create build group
      ansible.builtin.group:
        name: aur_builder

    - name: create build user
      ansible.builtin.user:
        name: aur_builder
        group: aur_builder

    - name: update package cache
      ansible.builtin.package:
        update_cache: true

    - name: install python-pycdlib
      become: true
      become_user: aur_builder
      bodsch.core.aur:
        state: present
        name: python-pycdlib
        repository: https://aur.archlinux.org/python-pycdlib.git
      async: 3200
      poll: 10
      register: _pycdlib_installed
