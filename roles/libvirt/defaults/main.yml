---

# Which libvirt daemon model to use:
#   auto       - monolithic 'libvirtd' below libvirt 10, modular 'virt*d' from 10 onwards
#   monolithic - always use the monolithic libvirtd (also on libvirt >= 10)
#   modular    - always use the modular virt*d daemons
libvirt_daemon_model: "auto"

libvirt_service: {}
#   libvirtd_args: []                                   # '--timeout 120' | --listen | ...
#   qemu_audio_drv: ""                                  # sdl
#   sdl_audiodriver: ""                                 # pulse
#   #
#   start_libvirtd: ""                                  #
#   mount_cgroups: ""                                   #
#   cgroups:  []                                        #

# Service/socket lifecycle for both the monolithic 'libvirtd' and the modular
# 'virt*d' daemons. Merged over libvirt_defaults_services (see vars/main.yml).
# https://libvirt.org/daemons.html#monolithic-vs-modular-daemons
libvirt_services: {}
#   # --- monolithic ---
#   libvirtd:
#     service:
#       state: started
#       enabled: true
#     tcp_socket:
#       state: stopped
#       enabled: false
#     tls_socket:
#       state: stopped
#       enabled: false
#   # --- modular daemons ---
#   ch:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: stopped
#       enabled: false
#   interface:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   lock:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: stopped
#       enabled: false
#   log:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   lxc:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: stopped
#       enabled: false
#   network:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   nodedev:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   nwfilter:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   proxy:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: stopped
#       enabled: false
#   qemu:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   secret:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   storage:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: started
#       enabled: true
#   vbox:
#     service:
#       state: stopped
#       enabled: false
#     socket:
#       state: stopped
#       enabled: false

libvirt_ch: {}

libvirt_interface: {}

libvirt_lock: {}

libvirt_log: {}

libvirt_login_shell: {}

libvirt_lxc: {}

libvirt_network: {}

libvirt_nodedev: {}

libvirt_nwfilter: {}

libvirt_proxy: {}

libvirt_qemu: {}

libvirt_secret: {}

libvirt_storage: {}

libvirt_vbox: {}

libvirt_virtual_networks: []

libvirt_storage_pools: []

# monolithic
libvirt_libvirtd: {}

