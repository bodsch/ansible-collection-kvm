---

# Per-daemon service/socket lifecycle, merged over libvirt_defaults_services.
# On a modular host (libvirt >= 10) this enables the matching virt*d sockets;
# the monolithic 'libvirtd' is disabled automatically.
libvirt_services:
  storage:
    service:
      state: stopped
      enabled: false
    socket:
      state: started
      enabled: true

libvirt_libvirtd:
  enable_tcp: true
  tcp_port: 16509
  listen_addr: "{{ ansible_facts.default_ipv4.address }}"
  auth_unix_ro: "none"
  auth_unix_rw: "none"
  # https://libvirt.org/kbase/debuglogs.html#libvirt-daemons-logging-configuration
  log_level: 3
  log_filters:
    - 3:remote
    - 4:event
    - 3:util.json
    - 3:util.object
    - 3:util.dbus
    - 3:util.netlink
    - 3:node_device
    - 3:rpc
    - 3:access
    - 1:*y

  log_outputs:
    - 2:file:/var/log/libvirt/libvirtd.log
    - 3:journald

...
