---

- name: install kvm / libvirt
  become: true
  ansible.builtin.package:
    name: "{{ libvirt_packages }}"
    state: present
  register: result
  until: result is successful

- name: detect libvirtd version
  become: true
  bodsch.kvm.libvirtd_version:
  register: _libvirtd_version

- name: set libvirtd version
  ansible.builtin.set_fact:
    libvirtd_version: '{{ _libvirtd_version.version }}'
  when:
    - _libvirtd_version is defined
    - _libvirtd_version.version is defined
    - _libvirtd_version.version | string | length > 0

# Resolve the effective daemon model once, so configure and service phases agree.
# 'auto' falls back to the version heuristic (modular from libvirt 10 onwards).
- name: resolve libvirt daemon model
  ansible.builtin.set_fact:
    libvirt_use_modular: "{{
      (libvirt_daemon_model == 'modular') or
      (libvirt_daemon_model == 'auto' and (libvirtd_version is version_compare('10', operator='>='))) }}"

- name: report effective daemon model
  ansible.builtin.debug:
    msg: "model={{ libvirt_daemon_model }} -> {{ 'modular' if (libvirt_use_modular | bool) else 'monolithic' }} (libvirtd {{ libvirtd_version }})"

# Published for the storage_pool / network roles, which read this fact instead of
# re-detecting the model (see those roles' prepare.yml).
- name: create custom fact file
  bodsch.core.facts:
    name: libvirtd
    facts:
      version: "{{ libvirtd_version }}"
      daemon_model: "{{ libvirt_daemon_model }}"
      use_modular: "{{ libvirt_use_modular | bool }}"

...
