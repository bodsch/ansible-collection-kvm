---

- name: ensure the libvirt network daemon is available
  become: true
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ ['virtqemud.socket', 'virtnetworkd.socket'] if (network_use_modular | bool) else ['libvirtd.service'] }}"
  loop_control:
    label: "{{ item }}"
  when:
    - not ansible_check_mode
    - ansible_facts.service_mgr | lower == "systemd"

# Define each network, reconcile its run state and autostart in a single call.
# The role's flat virtual_networks data model (enable_dhcp / dhcp_* plus the
# network-level domain/DNS variables) is bridged to the module's structured
# dns/dhcp/vlans schema by the network_specs filter.
- name: reconcile virtual networks
  become: true
  bodsch.kvm.libvirt_network:
    networks: "{{ virtual_networks | bodsch.kvm.network_specs(network_domain_name, network_dns_primary, network_dns_secondary) }}"

...
