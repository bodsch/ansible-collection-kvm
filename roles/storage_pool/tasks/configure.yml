---

- name: ensure storage pool target paths exist
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: u=rwx,g=rx,o=rx
  loop: "{{ storage_pools }}"
  loop_control:
    label: "{{ item.path | default(item.name) }}"
  when:
    - item.path is defined
    - item.state | default("present") != "absent"

- name: ensure the libvirt storage daemon is available
  become: true
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ ['virtqemud.socket', 'virtstoraged.socket'] if (storage_pool_use_modular | bool) else ['libvirtd.service'] }}"
  loop_control:
    label: "{{ item }}"
  when:
    - not ansible_check_mode
    - ansible_facts.service_mgr | lower == "systemd"

# Define each pool, reconcile its run state (present|active|inactive|absent) and
# autostart in a single call. The 'path' key maps to the module's 'target_path'.
- name: reconcile storage pools
  become: true
  bodsch.kvm.libvirt_pool:
    pools: "{{ storage_pools }}"

...
